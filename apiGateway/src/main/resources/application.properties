spring.application.name=apiGateway
server.port=8086

eureka.client.service-url.defaultZone=${SERVICEREGISTRY_URL}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.non-secure-port=${EUREKA_INSTANCE_NON_SECURE_PORT:8086}
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${eureka.instance.hostname}:${spring.application.name}:${eureka.instance.non-secure-port}


# INFO ENDPOINT CONFIGURATION
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
logging.level.org.springframework.security.web=TRACE
logging.level.org.springframework.web.cors=TRACE
logging.level.org.springframework.cloud.gateway=TRACE