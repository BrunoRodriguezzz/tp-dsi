spring.application.name=serviceRegistry
server.port=8088

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Configuracion de Actuator
eureka.instance.health-check-url-path=/actuator/health
eureka.instance.status-page-url-path=/actuator/health

# Configuracion para DESARROLLO - deshabilitar self-preservation
#eureka.server.enable-self-preservation=false
#eureka.server.eviction-interval-timer-in-ms=10000
#eureka.server.renewal-percent-threshold=0.49

# Configuracion para PRODUCCION - habilitar self-preservation
eureka.server.enable-self-preservation=true
eureka.server.renewal-percent-threshold=0.85
eureka.server.eviction-interval-timer-in-ms=60000

# Intervalos m·s r·pidos para desarrollo
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Exclude database auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.security.enabled=false