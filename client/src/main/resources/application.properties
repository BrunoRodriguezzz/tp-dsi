spring.application.name=client
ruta.archivos=./client/public/media-uploads/
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

server.servlet.encoding.charset=UTF-8
spring.mvc.charset=UTF-8
server.servlet.encoding.force=true

# Configuraciˇn para subir archivos grandes
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Timeouts para importaciˇn de archivos grandes
spring.mvc.async.request-timeout=600000
feign.client.config.default.connectTimeout=600000
feign.client.config.default.readTimeout=600000

# Servicios
servicio.agregador=http://localhost:8082
servicio.dinamica=http://localhost:8081/api/fuenteDinamica
servicio.auth=http://localhost:8087/auth
servicio.estadisticas=http://localhost:8085/estadisticas
servicio.apiGateway=http://localhost:8086
servicio.estatica=http://localhost:8084


# El interruptor maestro: apaga completamente el cliente de Eureka
eureka.client.enabled=false

# (Opcional) Refuerzo para asegurar que no intente registrarse ni buscar servicios
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false