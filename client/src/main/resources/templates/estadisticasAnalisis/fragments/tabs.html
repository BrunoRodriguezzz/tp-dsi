<li th:fragment="tabButton(labelLong, labelShort, iconClass, target, active)"
    class="nav-item flex-fill"
    role="presentation">
    <button
            th:class="${active} ? 'nav-link w-100 active' : 'nav-link w-100'"
            type="button"
            data-bs-toggle="tab"
            th:attr="data-bs-target=${target},
                 aria-controls=${#strings.substring(target,1)},
                 aria-selected=${active}"
            role="tab">
        <i th:class="${iconClass} + ' me-2'"></i>
        <span class="d-none d-sm-inline" th:text="${labelLong}">Label</span>
        <span class="d-sm-none" th:text="${labelShort}">Short</span>
    </button>
</li>
