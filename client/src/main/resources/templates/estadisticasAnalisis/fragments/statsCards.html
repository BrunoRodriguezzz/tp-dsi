<!-- Fragmento de Statistics Cards para Estadisticas -->
<div th:fragment="statsCard(title, value, iconClass, iconBgClass, iconTextClass)">
    <div class="col-6 col-lg-3">
        <div class="card stats-card h-100">
            <div class="card-body d-flex align-items-center">
                <div th:class="${iconBgClass} + ' icon-wrapper me-3'">
                    <i th:class="${iconClass} + ' ' + ${iconTextClass} + ' fs-4'"></i>
                </div>

                <div class="flex-grow-1 min-w-0">
                    <p class="card-text small text-muted mb-1" th:text="${title}">Título</p>
                    <h5 class="card-title mb-0 fw-bold" th:text="${value} ?: '—'">123</h5>
                </div>
            </div>
        </div>
    </div>
</div>
