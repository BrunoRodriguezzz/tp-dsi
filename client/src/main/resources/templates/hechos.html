<html lang="en" th:replace="~{layout/base :: html}">
<th:block th:fragment="additional-links">
    <link rel="stylesheet" th:href="@{/css/mapaEmbed.css}">
    <link rel="stylesheet" th:href="@{/css/hechos.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta3/css/bootstrap-select.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet"/>
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js" rel="preload" as="script"/>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
</th:block>
<div th:fragment="contenido" class="container py-4">
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
        <div>
            <h2>Todos los Hechos</h2>
            <h6>Explora y filtra todos los hechos registrados en el sistema</h6>
            <p th:text="|${cantidad} hechos mostrados|"></p>
        </div>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <button class="btn btn-outline-secondary config-mostrarFiltros" data-bs-toggle="collapse" data-bs-target="#filtrosCollapse" aria-expanded="false" aria-controls="filtrosCollapse">Mostrar Filtros</button>
            <a th:href="@{/publicarHecho}" class="btn btn-dark">+ Publicar Hecho</a>
        </div>
    </div>

    <div th:replace="~{fragments/filtros :: filtros(actionUrl=@{/hechos}, clearUrl=@{/hechos})}"></div>
        <div th:if="${cantidad == 0}">
            <div th:insert="~{fragments/vacio :: vacio}"></div>
        </div>

        <div class="hecho-card" th:each="hecho: ${hechos}">
            <div class="hecho-card-mas-opciones">
                <div class="titulo-mas-descripcion">
                    <h2 class="titulo-Hecho" th:text="${hecho.titulo}">Sin título</h2>
                    <p class="descripcion" th:text="${hecho.descripcion}">Sin descripción</p>
                </div>
                <div class="opciones">
                    <p class="etiqueta-categoria config-categoria distancia-opciones" th:text="${hecho.categoria}">Sin Categoría</p>
                    <a href="verDetalle-hecho1.html" class="btn btn-primary btn-dark config-opciones" th:href="@{/hechos/{id}(id=${hecho.id})}">Ver Detalles</a>
                    <a th:href="@{/hechos/eliminacion/{id}(id=${hecho.id})}" class="btn btn-outline-danger config-opciones">Solicitar Eliminacion</a>
                </div>
            </div>
            <div class="informacion-general">
                <div class="fecha-ubicacion-fuente">
                    <p class="info-fecha-ubicacion-fuente" th:text="|Fecha: ${hecho.fechaAcontecimiento != null ? hecho.fechaAcontecimiento.toString().substring(0, 10) : 'Sin fecha'}|"></p>
                    <p class="info-fecha-ubicacion-fuente"
                       th:text="${
                               hecho.ubicacion == null or hecho.ubicacion.nombreProvincia == null
                               ? 'Ubicación: Sin provincia'
                               : (hecho.ubicacion.municipio != null
                                   ? 'Ubicación: ' + hecho.ubicacion.nombreProvincia + ', ' + hecho.ubicacion.municipio
                                   : 'Ubicación: ' + hecho.ubicacion.nombreProvincia)
                           }">
                    </p>
                    <p class="info-fecha-ubicacion-fuente" th:text="|Fuente: ${hecho.fuente}|"></p>
                </div>
            </div>
        </div>

    <div th:if="${totalPages > 1}" class="d-flex justify-content-center my-4">
        <nav aria-label="Paginación de hechos">
            <ul class="pagination flex-wrap gap-2">
                <!-- Botón Página Anterior -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a th:if="${currentPage > 0}"
                       th:href="@{/hechos(page=${currentPage - 1}, size=${size}, fechaAcontecimientoInicio=${param.fechaAcontecimientoInicio}, fechaAcontecimientoFin=${param.fechaAcontecimientoFin}, categoria=${param.categoria}, lat=${param.lat}, lng=${param.lng}, fuente=${param.fuente})}"
                       class="btn btn-dark">Página Anterior</a>
                </li>

                <!-- Primera página -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'active'">
                    <span th:if="${0 == currentPage}" class="page-link bg-primary border-primary text-white fw-bold">1</span>
                    <a th:if="${0 != currentPage}"
                       th:href="@{/hechos(page=0, size=${size}, fechaAcontecimientoInicio=${param.fechaAcontecimientoInicio}, fechaAcontecimientoFin=${param.fechaAcontecimientoFin}, categoria=${param.categoria}, lat=${param.lat}, lng=${param.lng}, fuente=${param.fuente})}"
                       class="page-link">1</a>
                </li>

                <!-- Puntos suspensivos iniciales -->
                <li th:if="${currentPage > 3}" class="page-item disabled">
                    <span class="page-link">...</span>
                </li>

                <!-- Páginas intermedias -->
                <th:block th:each="i : ${#numbers.sequence(currentPage - 2, currentPage + 2)}" th:if="${i > 0 and i < totalPages - 1}">
                    <li class="page-item" th:classappend="${i == currentPage} ? 'active'">
                        <span th:if="${i == currentPage}" class="page-link bg-primary border-primary text-white fw-bold" th:text="${i + 1}"></span>
                        <a th:if="${i != currentPage}"
                           th:href="@{/hechos(page=${i}, size=${size}, fechaAcontecimientoInicio=${param.fechaAcontecimientoInicio}, fechaAcontecimientoFin=${param.fechaAcontecimientoFin}, categoria=${param.categoria}, lat=${param.lat}, lng=${param.lng}, fuente=${param.fuente})}"
                           class="page-link" th:text="${i + 1}"></a>
                    </li>
                </th:block>

                <!-- Puntos suspensivos finales -->
                <li th:if="${currentPage < totalPages - 4}" class="page-item disabled">
                    <span class="page-link">...</span>
                </li>

                <!-- Última página -->
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'active'">
                    <span th:if="${totalPages - 1 == currentPage}" class="page-link bg-primary border-primary text-white fw-bold" th:text="${totalPages}"></span>
                    <a th:if="${totalPages - 1 != currentPage}"
                       th:href="@{/hechos(page=${totalPages - 1}, size=${size}, fechaAcontecimientoInicio=${param.fechaAcontecimientoInicio}, fechaAcontecimientoFin=${param.fechaAcontecimientoFin}, categoria=${param.categoria}, lat=${param.lat}, lng=${param.lng}, fuente=${param.fuente})}"
                       class="page-link" th:text="${totalPages}"></a>
                </li>

                <!-- Botón Página Siguiente -->
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a th:if="${currentPage < totalPages - 1}"
                       th:href="@{/hechos(page=${currentPage + 1}, size=${size}, fechaAcontecimientoInicio=${param.fechaAcontecimientoInicio}, fechaAcontecimientoFin=${param.fechaAcontecimientoFin}, categoria=${param.categoria}, lat=${param.lat}, lng=${param.lng}, fuente=${param.fuente})}"
                       class="btn btn-dark">Página Siguiente</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</html>
