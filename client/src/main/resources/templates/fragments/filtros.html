<th:block th:fragment="filtros (actionUrl, clearUrl)">
    <div class="collapse" id="filtrosCollapse">
        <div class="card card-body mb-3">
            <form id="filtrosForm" th:action="${actionUrl}" method="get">
                <div class="row">
                    <div class="col-12 col-md-6 mb-3 mb-md-0">
                        <p class="text-dark mb-2">Ingrese su Ubicación deseada</p>
                        <div id="geocoder" class="mb-2"></div>
                        <div id="map" class="map mapa"></div>
                        <button type="button" id="btnGPS" class="btn btn-sm btn-outline-primary w-100 mt-1">
                            <i class="bi bi-geo-alt-fill"></i> Mi Ubicación Actual
                        </button>
                        <input type="hidden" id="latInput" name="lat" th:value="${param.lat}">
                        <input type="hidden" id="lngInput" name="lng" th:value="${param.lng}">
                        <input type="hidden" id="latitudInput" name="latitud" th:value="${param.latitud}">
                        <input type="hidden" id="longitudInput" name="longitud" th:value="${param.longitud}">
                        <input type="hidden" id="ubicacionInput" name="ubicacion" th:value="${param.ubicacion}">
                        <input type="hidden" id="municipioInput" name="municipio" th:value="${param.municipio}">
                        <input type="hidden" id="provinciaInput" name="provincia" th:value="${param.provincia}">
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="row mb-3">
                            <div class="col-6">
                                <label for="fechaAcontecimientoInicio" class="form-label">Fecha desde</label>
                                <input type="date" class="form-control" id="fechaAcontecimientoInicio" name="fechaAcontecimientoInicio" th:value="${param.fechaAcontecimientoInicio}">
                            </div>
                            <div class="col-6">
                                <label for="fechaAcontecimientoFin" class="form-label">Fecha hasta</label>
                                <input type="date" class="form-control" id="fechaAcontecimientoFin" name="fechaAcontecimientoFin" th:value="${param.fechaAcontecimientoFin}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="categoria" class="form-label">Categoría</label>
                            <input type="text" class="form-control" id="categoria" name="categoria" th:value="${param.categoria}">
                        </div>

                        <div class="mb-3">
                            <label for="fuente" class="form-label">Fuente</label>
                            <input type="text" class="form-control" id="fuente" name="fuente" th:value="${param.fuente}">
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="submit" class="btn btn-dark">Filtrar</button>
                            <button type="button" class="btn btn-outline-secondary" onclick="limpiarFiltros()">Limpiar</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        function limpiarFiltros() {
            window.location.href = window.location.origin + window.location.pathname;
        }
    </script>
    <script th:src="@{/js/mapa.js}"></script>
</th:block>
