<!-- Fragmento para las acciones los hechos pendientes -->
<th:block th:fragment="accionesHechosPendientes(hechoId, adminId)">
    <div class="hecho-acciones">

        <!-- Aprobar -->
        <form th:action="@{/hechos/gestion}" method="post" style="display:inline;">
            <input type="hidden" name="id" th:value="${hechoId}" />
            <input type="hidden" name="idAdministrador" th:value="${adminId}" />
            <input type="hidden" name="estadoHecho" value="ACEPTADA" />
            <input type="hidden" name="etiquetas" value="" />
            <input type="hidden" name="sugerenciaDeCambio" value="" />
            <button type="submit" class="btn btn-aprobar">
                <i class="fas fa-check"></i> Aprobar
            </button>
        </form>

        <!-- Modificar (envía una sugerencia) -->
        <form th:action="@{'/hechos/aceptarConSugerencia/' + ${hechoId}}" method="get" style="display:inline;">
            <button type="submit" class="btn btn-modificar">
                <i class="fas fa-edit"></i> Modificar
            </button>
        </form>

        <!-- Rechazar -->
        <form th:action="@{/hechos/gestion}" method="post" style="display:inline;">
            <input type="hidden" name="id" th:value="${hechoId}" />
            <input type="hidden" name="idAdministrador" th:value="${adminId}" />
            <input type="hidden" name="estadoHecho" value="RECHAZADA" />
            <input type="hidden" name="etiquetas" value="" />
            <input type="hidden" name="sugerenciaDeCambio" value="No cumple criterios" />
            <button type="submit" class="btn btn-rechazar">
                <i class="fas fa-times"></i> Rechazar
            </button>
        </form>

<!--        <a th:href="@{'/hechos/' + ${hechoId}}" class="btn btn-ver">-->
<!--            <i class="fas fa-eye"></i> Ver-->
<!--        </a>-->
    </div>
</th:block>
