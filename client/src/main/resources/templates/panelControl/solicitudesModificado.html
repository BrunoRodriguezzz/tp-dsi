<html th:replace="~{layout/base :: html}">

<head>
    <th:block th:fragment="additional-links">
        <link rel="stylesheet" th:href="@{/css/panelControl/fuentesRecientes.css}">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </th:block>
</head>

<div th:fragment="contenido" class="container">
    <div class="page-info">
        <a th:href="@{/panelControl}" class="link" id="link-panelDeControl">← Volver al Panel de Control</a>
        <h2><strong>Solicitudes de Modificación</strong></h2>
        <p>Gestiona, compara y aprueba las modificaciones solicitadas por los usuarios de la comunidad.</p>
    </div>
    <div class="container-totalFuentes">
        <div class="logo-database">
            <i class="bi bi-pencil-square fs-5"></i>
        </div>
        <div>
            <p>Total de Solicitudes de Modificación Pendientes</p>
            <h4 th:text="${cantidadSolicitudes}"><strong>0</strong></h4>
        </div>
    </div>
    <div class="container-fuentesCreadas">
        <div class="hechosAprobacion-header d-flex align-items-center mb-3 gap-3">
            <i class="bi bi-pencil-square"></i>
            <h6 class="mb-0"><strong>Solicitudes Esperando Aprobación</strong></h6>
        </div>

        <div class="fuentes-lista">
            <div th:each="item : ${solicitudes}">
                <div th:replace="~{panelControl/fragments/propuestaModificacion :: propuestaModificacion(item=${item})}"></div>
            </div>
        </div>
    </div>
</div>
