<!DOCTYPE html>
<html lang="es" th:replace="~{layout/base :: html}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${coleccion != null} ? coleccion.titulo : 'Colección no encontrada'">Coleccion</title>
    <th:block th:fragment="additional-links">
        <link rel="stylesheet" th:href="@{/css/styles.css}">
        <link rel="stylesheet" th:href="@{/css/components.css}">
        <link rel="stylesheet" th:href="@{/css/header.css}">
        <link rel="stylesheet" th:href="@{/css/footer.css}">
        <link rel="stylesheet" th:href="@{/css/coleccion.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
        <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </th:block>
</head>
<body>
<div th:fragment="contenido">
    <main class="container">
        <div th:if="${coleccion == null}">
            <h2>Colección no encontrada</h2>
            <p>La colección solicitada no existe.</p>
        </div>

        <div th:if="${coleccion != null}">
            <div class="titulo-descripcion" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; margin-bottom: 1.5rem;">
                <div class="colecciones-titulo-descripcion-container">
                    <h2 th:text="${coleccion.titulo}">Título Colección</h2>
                    <p th:text="${coleccion.descripcion}">Descripción de la colección</p>
                </div>
                <div class="titulos-buttons">
                    <button class="btn btn-filtro" onclick="document.querySelector('.filtros-container').style.display = (document.querySelector('.filtros-container').style.display === 'none' ? 'block' : 'none')">Mostrar filtros</button>
                    <a th:if="${coleccion.id != null}" th:href="@{'/editarColeccion/' + ${coleccion.id}}">
                        <button class="nav-item btn btn-outline-primary">Modificar Colección</button>
                    </a>
                </div>
            </div>

            <div class="modos-navegacion-container" id="modos-navegacion" style="margin-bottom: 0.5rem;">
                <button type="button" class="modo-navegacion-btn curado active" data-modo="curado">Navegando en modo Curado</button>
                <button type="button" class="modo-navegacion-btn irrestricto" data-modo="irrestricto">Navegando en modo Irrestricto</button>
            </div>

            <div class="parrafos-modos-navegacion" style="margin-bottom: 1.2rem;">
                <span style="font-weight: 500;">Algoritmos:</span>
                <div class="modos-navegacion-container" id="algoritmos">
                    <button type="button" class="etiqueta-algoritmo-consenso filtro-algoritmo" th:each="consenso : ${coleccion.consensos}" th:text="${consenso}" th:data-algoritmo="${consenso}">Algoritmo</button>
                </div>
            </div>

            <div class="filtros-container" style="display: none;">
                <h5>Filtros</h5>
                <div class="filtros-grid">
                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <select id="categoria" class="form-select">
                            <option>Todas las categorías</option>
                            <option>Opción 1</option>
                            <option>Opción 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fecha-desde">Fecha Desde</label>
                        <input type="date" id="fecha-desde" class="form-control" placeholder="dd/mm/aaaa">
                    </div>
                    <div class="form-group">
                        <label for="fecha-hasta">Fecha Hasta</label>
                        <input type="date" id="fecha-hasta" class="form-control" placeholder="dd/mm/aaaa">
                    </div>
                    <div class="form-group wide">
                        <label for="ubicacion">Ubicación</label>
                        <input type="text" id="ubicacion" class="form-control" placeholder="Buscar por ubicación...">
                    </div>
                    <div class="form-group wide">
                        <label for="fuente">Fuente</label>
                        <input type="text" id="fuente" class="form-control" placeholder="Buscar por fuente...">
                    </div>
                    <div class="form-group wide">
                        <label>&nbsp;</label>
                        <button type="button" class="btn btn-outline-secondary w-100" id="limpiar-filtros">Limpiar Filtros</button>
                    </div>
                </div>
            </div>

            <div class="hechos-container" id="hechos-container"></div>
        </div>
    </main>

    <script th:src="@{/js/coleccion.js}"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            var coleccionId = /*[[${coleccion.id}]]*/ 0;
            if (coleccionId === 0) return;
            fetch('/coleccion/' + coleccionId + '/hechos')
                .then(response => response.json())
                .then(hechos => {
                    const container = document.getElementById('hechos-container');
                    if (!hechos || hechos.length === 0) {
                        container.innerHTML = '<p>No hay hechos para esta colección.</p>';
                        return;
                    }
                    let html = '';
                    hechos.forEach(hecho => {
                        html += `
                        <div class="hecho-card">
                            <div class="card-col-izq">
                                <div class="card-header">${hecho.titulo || ''}</div>
                                <div class="card-desc">${hecho.descripcion || ''}</div>
                                <div class="card-info-row">
                                    <p><b>Fecha:</b> ${hecho.fechaAcontecimiento || ''}</p>
                                    <p><b>Ubicación:</b> ${hecho.ubicacion || ''}</p>
                                    <p><b>Fuente:</b> ${hecho.fuente || ''}</p>
                                </div>
                                <div class="card-etiquetas">
                                    ${(hecho.etiquetas || []).map(etiqueta => `<span class="card-etiqueta">${etiqueta}</span>`).join('')}
                                </div>
                                <div class="card-footer">
                                    <i class="fa-regular fa-calendar"></i>
                                    <span>Publicado: ${hecho.fechaPublicacion || ''}</span>
                                </div>
                            </div>
                            <div class="card-col-der">
                                <span class="card-categoria">${hecho.categoria || ''}</span>
                                <div class="card-botones">
                                    <a th:href="@{'/verDetalle/' + ${hecho.id}}" class="btn btn-dark">Ver Detalle</a>
                                    <a href="/reportarHecho" class="btn btn-red">Reportar</a>
                                </div>
                            </div>
                        </div>`;
                    });
                    container.innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('hechos-container').innerHTML = '<p>Error al cargar los hechos.</p>';
                });
        });
    </script>
    <th:block th:fragment="additional-scripts"></th:block>
</div>
</body>
</html>
