<!DOCTYPE html>
<html lang="es" th:replace="~{layout/base :: html}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Colección</title>
    <th:block th:fragment="additional-links">
        <link rel="stylesheet" th:href="@{/css/styles.css}">
        <link rel="stylesheet" th:href="@{/css/components.css}">
        <link rel="stylesheet" th:href="@{/css/coleccion.css}">
        <link rel="stylesheet" th:href="@{/css/header.css}">
        <link rel="stylesheet" th:href="@{/css/footer.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
        <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </th:block>
</head>
<body>
    <div th:fragment="contenido">
        <main class="container">
            <div class="outer-form">
                <h2><strong>Editar Colección</strong></h2>
                <p>Modifica los atributos de una coleccion libremente</p>
            </div>
            <form class="form-coleccion">
                <div class="form-section">
                    <h3><strong>Información Básica</strong></h3>
                    <p>Define el título y descripción de tu colección</p>
                    <div class="form-group">
                        <h6>Título de la Colección</h6>
                        <input type="text" class="form-control" value="Protestas Sociales" placeholder="Ej: Protestas Sociales 2024" id="titleColeccionInput" name="titulo">
                    </div>
                    <div class="form-group">
                        <h6>Descripcion</h6>
                        <textarea class="form-control" placeholder="Describe el proposito y alcance de esta coleccion..." id="descripcionInput" name="descripcion" rows="4">Recopilación de manifestaciones y protestas sociales registradas durante el año 2024</textarea>
                    </div>
                </div>
                <div class="form-section">
                    <h3><strong>Algoritmo de Consenso</strong></h3>
                    <p>Selecciona el algoritmo de consenso para la colección</p>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Algoritmo de consenso" id="consensoInput" name="consenso">
                    </div>
                </div>
                <div class="botones-formulario">
                    <button type="submit" class="btn btn-dark px-5 py-2">Guardar Cambios</button>
                    <a th:href="@{/colecciones}" class="btn btn-outline-secondary px-5 py-2 btn-cancelar">Cancelar</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
