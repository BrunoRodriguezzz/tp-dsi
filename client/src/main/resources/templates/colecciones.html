<!DOCTYPE html>
<html lang="es" th:replace="~{layout/base :: html}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colecciones</title>
    <th:block th:fragment="additional-links">
        <link rel="stylesheet" th:href="@{/css/styles.css}">
        <link rel="stylesheet" th:href="@{/css/components.css}">
        <link rel="stylesheet" th:href="@{/css/coleccion.css}">
        <link rel="stylesheet" th:href="@{/css/header.css}">
        <link rel="stylesheet" th:href="@{/css/footer.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
        <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </th:block>
</head>
<body>
    <div th:fragment="contenido">
        <main class="container">
            <div class="row titulo-descripcion-opciones">
                <div class="colecciones-titulo-descripcion-container col">
                    <h2>Colecciones</h2>
                    <p class="descripcion">Explora las diferentes colecciones de hechos organizados por temática</p>
                </div>
                <div class="colecciones-opciones col">
                    <a th:href="@{/publicarColeccion}" class="link" id="link-nuevaSolicitud">
                        <button class="btn btn-dark">+ Nueva Colección</button>
                    </a>
                </div>
            </div>
            <div class="colecciones-container">
                <div class="row">
                    <div class="col" th:each="coleccion : ${colecciones}">
                        <div class="coleccion-card">
                            <h3 th:text="${coleccion.titulo}">Nombre Colección</h3>
                            <p class="coleccion-cantidad-hechos" th:text="${coleccion.cantidadHechos} + ' hechos registrados'">0 hechos registrados</p>
                            <p th:text="${coleccion.descripcion}">Descripción de la colección</p>
                            <p>Algoritmos de Consenso:</p>
                            <div class="etiquetas-algoritmos-container">
                                <p class="etiqueta-algoritmo-consenso" th:each="consenso : ${coleccion.consensos}" th:text="${consenso}">Algoritmo</p>
                            </div>
                            <a th:href="@{/hechos/coleccion/{id}(id=${coleccion.id})}" class="link-coleccion">Ver Colección →</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
