<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa con múltiples puntos - Mapbox</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/mapa.css}">
</head>
<body>
<h1>Mapa con múltiples ubicaciones</h1>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>

<script th:inline="javascript">
    const mapboxToken = /*[[${mapboxToken}]]*/ '';
    const puntos = /*[[${puntos}]]*/ [];

    mapboxgl.accessToken = mapboxToken;

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: puntos.length > 0 ? [puntos[0].lng, puntos[0].lat] : [0,0], // centrado en el primer punto si existe
        zoom: 5
    });

    // Agrega controles
    map.addControl(new mapboxgl.NavigationControl());

    // Agrega marcadores
    puntos.forEach(p => {
        new mapboxgl.Marker()
            .setLngLat([p.lng, p.lat])
            .setPopup(new mapboxgl.Popup().setHTML(`<strong>${p.nombre}</strong>`))
            .addTo(map);
    });

    // Ajusta el mapa para mostrar todos los puntos
    if (puntos.length > 0) {
        const bounds = new mapboxgl.LngLatBounds();
        puntos.forEach(p => bounds.extend([p.lng, p.lat]));
        map.fitBounds(bounds, { padding: 50 });
    }
</script>
</body>
</html>
