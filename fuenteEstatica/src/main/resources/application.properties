spring.application.name=fuente-estatica

# Configuraci?n de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/MetaMapa_Estatica?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraci?n de sincronizaci?n de entities contra la base de datos
spring.jpa.hibernate.ddl-auto=update
# none: no toca la BD.
# validate: valida que las entidades coincidan con la BD.
# update: actualiza la BD seg?n las entidades (muy usado en desarrollo).
# create: crea las tablas en cada inicio.
# create-drop: igual que create pero borra al apagar.

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Servicios
servicio.estatica=http://localhost:8084

# Path del Archivo
nombre.csv=desastres_tecnologicos_argentina
path.csv=fuenteEstatica/src/main/resources/desastres_tecnologicos_argentina.csv
#nombre.csv=aa
#path.csv=fuenteEstatica/src/main/resources/aa.csv
server.port=8084

# Configuracion de Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8088/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# Configuracion de Actuator para health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Configuraciones para manejar archivos CSV grandes
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
server.tomcat.connection-timeout=300000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=20

# Configuración para subir archivos CSV grandes
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Timeouts para importación de archivos grandes
spring.mvc.async.request-timeout=600000
feign.client.config.default.connectTimeout=600000
feign.client.config.default.readTimeout=600000
