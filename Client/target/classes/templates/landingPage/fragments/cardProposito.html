<!-- Fragmento de Purpose-Card para la landing page -->
<div th:fragment="purpose-card(icon, title, description)" class="col">
    <div class="card">
        <div class="card-body">
            <div class="card-logo-container">
                <i th:class="'fa-solid ' + ${icon} + ' card-icon'"></i>
            </div>
            <h5 class="card-title" th:text="${title}"></h5>
            <p class="card-text" th:text="${description}"></p>
        </div>
    </div>
</div>
