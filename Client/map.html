<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta3/css/bootstrap-select.min.css">
</head>
<body>
    <a class="nav-link active" aria-current="page" href="index.html">Volver al Home</a>
    <div class="map-container">
        Acá va el mapa interactivo
    </div>
    <div class="filters-container">
        <h2>Filtros</h2>
        <form>
            <div class="mb-3">
                <label for="titleInput" class="form-label">Título</label>
                <input type="text" class="form-control" id="titleInput">
            </div>
            
            <div class="mb-3">
                <label for="categoryInput" class="form-label">Categoría</label>
                <select class="form-select" aria-label="Default select example">
                    <option selected>Seleccionar categoría</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="dateStartInput" class="form-label">Fecha Inicio</label>
                <input type="date" class="form-control" id="dateInput">
            </div>
            
            <div class="mb-3">
                <label for="dateEndInput" class="form-label">Fecha Fin</label>
                <input type="date" class="form-control" id="dateInput">
            </div>
            
            <div class="mb-3">
                <label for="titleInput" class="form-label">Etiquetas</label>
                <input type="text" class="form-control" id="titleInput">
            </div>
            
            <!-- TODO: Limpiar filtros es necesario JS -->
            <button type="submit" class="btn btn-primary btn-dark">Aplicar Filtros</button>
            <button type="submit" class="btn btn-primary btn-outline-primary">Limpiar Filtros</button>
        </form>
    </div>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta3/js/bootstrap-select.min.js"></script>
</html>
