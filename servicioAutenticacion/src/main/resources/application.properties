spring.application.name=servicio-autenticacion
spring.datasource.url=jdbc:mysql://localhost:3306/metamapa_autenticacion?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=8087

SECRET_KEY=mySecretKey123456789012345678901234567890

# Configuracion de Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8088/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# Configuracion de Actuator para health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
